services:
  app:
    build: .
    environment:
      CLIENTS_DATABASE_URL: postgresql+psycopg://clients:clients@db:5432/clients
    depends_on: [db]
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clients
      POSTGRES_USER: clients
      POSTGRES_PASSWORD: clients
    volumes:
      - postgres_data:/var/lib/postgresql/data
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
volumes:
  postgres_data:
