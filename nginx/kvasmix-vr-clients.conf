# Добавьте этот location в существующий server {} для kvasmix.ru.
# Контейнер app публикуется только на localhost:8015.
location /vr/clients/ {
    proxy_pass http://127.0.0.1:8015/vr/clients/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /vr/clients;
    proxy_redirect off;
    client_max_body_size 100m;
}

location = /vr/clients {
    return 301 /vr/clients/;
}
